name: Otonom Investor Ingestion & PSEO Build

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  ingest-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Otonom Ingestion Scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scratch/auto_ingest_investors.py
          python scratch/auto_ingest_brands.py

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Programmatic SEO, Sitemap & AI llm.txt Builder
        run: |
          node generate_seo_pages.js
          python scripts/generate_llm_txt.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "CoMatch Otonom Bot"
          git config --global user.email "bot@comatch.org"
          git add investors.js brands.js sitemap.xml robots.txt llm.txt investors/ brands/
          # Only commit and push if changes actually exist to prevent empty commit loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: otonomly ingested new data and rebuilt PSEO pages [skip ci]" && git push origin main)
